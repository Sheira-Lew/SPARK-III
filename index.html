<!DOCTYPE html>-
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO Traffic Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>LEGO Pedestrian Monitor</h1>
            <div id="status-card" class="status-ok">
                <span id="status-label">ROAD CLEAR</span>
                <span id="count-badge">0</span>
            </div>
        </header>

        <div class="viewfinder-wrapper">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="overlay-canvas"></canvas>
        </div>
        
        <div class="footer-info">
            <p>Model: <strong>YOLO-Pro Nano</strong></p>
            <p>Target: <strong>Pedestrians</strong></p>
        </div>
    </div>

    <script src="edge-impulse-standalone.js"></script>
    <script src="script.js"></script>
</body>
</html>
